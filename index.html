<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toboolist</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <img id="logo-image" src="img/logo.png" alt="Logo Boolean">
        <span id="logo-text">Toboolist</span>
    </header>
    <!-- /Header -->

    <!-- Main -->
    <main>
        <div class="container">
            <nav class="main-nav">
                <button class="btn btn-filled">Add task</button>
                <button class="btn btn-empty">Add section</button>
            </nav>
            <section class="main-content">
                <ul class="sections-list">
                    <li>
                        <h3> &#9662; New task</h3>
                        <ul class="tasks-list">
                            <li>
                                <span class="circle circle-checked">&check;</span>
                                Quaterly Newsletter
                                <span class="tag tag-1">Editorial</span>
                            </li>
                        </ul>  
                    </li>
                    <li>
                        <h3> &#9662; Today</h3>
                        <ul class="tasks-list">
                            <li>
                                <span class="circle circle-checked">&check;</span>
                                Task 1
                                <span class="tag tag-1">Editorial</span>
                            </li>
                            <li>
                                <span class="circle circle-cross">&check;</span>
                                Task 2
                                <span class="tag tag-2">Recruiting</span>
                            </li>
                        </ul>  
                    </li>
                </ul>
            </section>
        </div>
    </main>
    <!-- /Main -->
    
</body>
</html>
